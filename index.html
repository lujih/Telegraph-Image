<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telegraph-Image | 免费图床</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0EA5E9;
      --primary-dark: #0284C7;
      --secondary: #38BDF8;
      --cta: #F97316;
      --cta-hover: #EA580C;
      --bg: #F0F9FF;
      --bg-card: rgba(255, 255, 255, 0.85);
      --text: #0C4A6E;
      --text-muted: #475569;
      --border: #E2E8F0;
      --success: #22C55E;
      --error: #EF4444;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.12);
      --radius: 16px;
      --transition: 0.2s ease;
    }

    .dark {
      --primary: #38BDF8;
      --primary-dark: #0EA5E9;
      --secondary: #7DD3FC;
      --cta: #FB923C;
      --cta-hover: #F97316;
      --bg: #0F172A;
      --bg-card: rgba(30, 41, 59, 0.85);
      --text: #F1F5F9;
      --text-muted: #94A3B8;
      --border: #334155;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(135deg, #0EA5E9 0%, #7C3AED 50%, #F97316 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .dark .bg-gradient {
      background: linear-gradient(135deg, #0C4A6E 0%, #4C1D95 50%, #9A3412 100%);
      background-size: 400% 400%;
    }

    /* Particle canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text);
      text-decoration: none;
    }

    .navbar-brand svg {
      width: 28px;
      height: 28px;
    }

    .navbar-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      transition: all var(--transition);
      cursor: pointer;
      background: none;
      border: none;
    }

    .navbar-link:hover {
      background: var(--border);
    }

    .navbar-link svg {
      width: 18px;
      height: 18px;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .theme-toggle:hover {
      background: var(--border);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }
    .dark .theme-toggle .sun { display: block; }
    .dark .theme-toggle .moon { display: none; }

    /* Main content */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 120px 20px 60px;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .hero p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255,255,255,0.85);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Upload card */
    .upload-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      margin-bottom: 32px;
      transition: all var(--transition);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: rgba(14, 165, 233, 0.05);
    }

    .drop-zone.dragover {
      transform: scale(1.01);
    }

    .drop-zone-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: var(--primary);
    }

    .drop-zone-icon svg {
      width: 100%;
      height: 100%;
    }

    .drop-zone-text {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .drop-zone-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .file-input {
      display: none;
    }

    /* Upload controls */
    .upload-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .control-select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--text-muted);
      color: white;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    /* File list */
    .file-list {
      margin-top: 24px;
      display: none;
    }

    .file-list.active { display: block; }

    .file-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .file-list-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .file-list-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .file-item:last-child { border-bottom: none; }

    .file-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }

    .file-thumb-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-muted);
    }

    .file-thumb-placeholder svg {
      width: 24px;
      height: 24px;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .file-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .file-size {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .file-status {
      font-size: 0.8rem;
      font-weight: 500;
    }

    .file-status.success { color: var(--success); }
    .file-status.error { color: var(--error); }

    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
      transition: width 0.15s ease;
    }

    .progress-bar.success { background: var(--success); }
    .progress-bar.error { background: var(--error); }

    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      padding: 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 0.9rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .stat-dot.success { background: var(--success); }
    .stat-dot.error { background: var(--error); }
    .stat-dot.pending { background: #FBBF24; }

    /* Results */
    .results {
      margin-top: 24px;
      display: none;
    }

    .results.active { display: block; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .results-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .results-links {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-item:last-child { border-bottom: none; }

    .result-thumb {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .result-link {
      flex: 1;
      font-size: 0.8rem;
      color: var(--primary);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-link:hover { text-decoration: underline; }

    .result-copy {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .result-copy:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Features */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .feature-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      transition: all var(--transition);
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      color: var(--primary);
    }

    .feature-icon svg {
      width: 100%;
      height: 100%;
    }

    .feature-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .feature-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 20px;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
    }

    .footer a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      font-size: 0.9rem;
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar {
        top: 8px;
        left: 8px;
        right: 8px;
        padding: 10px 16px;
      }

      .navbar-link span { display: none; }

      .main {
        padding: 100px 16px 40px;
      }

      .upload-card {
        padding: 20px;
      }

      .drop-zone {
        padding: 32px 16px;
      }

      .upload-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .btn { justify-content: center; }

      .features {
        grid-template-columns: 1fr;
      }

      .stats {
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

        <div class="feature-desc">支持图片、视频、音频和文档上传</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="feature-title">拖拽粘贴</div>
        <div class="feature-desc">拖拽文件或使用 Ctrl+V 粘贴上传</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="feature-title">稳定可靠</div>
        <div class="feature-desc">基于 Cloudflare 和 Telegram 基础设施</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    基于 <a href="https://github.com/cf-pages/Telegraph-Image" target="_blank" rel="noopener noreferrer">Telegraph-Image</a>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // Theme
    const themeToggle = document.getElementById('themeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (prefersDark || localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    // Particles
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.fill();
      }
    }

    function initParticles() {
      const count = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 15000));
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      animFrame = requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    // Check reduced motion
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      cancelAnimationFrame(animFrame);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Upload logic
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const fileList = document.getElementById('fileList');
    const fileListContent = document.getElementById('fileListContent');
    const fileSummary = document.getElementById('fileSummary');
    const statsBar = document.getElementById('statsBar');
    const resultArea = document.getElementById('resultArea');
    const resultLinks = document.getElementById('resultLinks');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const concurrencySelect = document.getElementById('concurrency');
    const toast = document.getElementById('toast');

    let selectedFiles = [];
    let uploadResults = [];
    let isUploading = false;
    const MAX_FILE_SIZE = 20 * 1024 * 1024;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function updateFileList() {
      if (!selectedFiles.length) {
        fileList.classList.remove('active');
        clearBtn.style.display = 'none';
        uploadBtn.disabled = true;
        return;
      }
      fileList.classList.add('active');
      clearBtn.style.display = 'inline-flex';
      uploadBtn.disabled = false;
      const total = selectedFiles.reduce((s, f) => s + f.size, 0);
      fileSummary.textContent = `${selectedFiles.length} 个文件，共 ${formatSize(total)}`;
      fileListContent.innerHTML = selectedFiles.map((file, idx) => {
        const isImage = file.type.startsWith('image/');
        const thumb = isImage
          ? `<img class="file-thumb" src="${URL.createObjectURL(file)}" alt="">`
          : `<div class="file-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>`;
        return `<div class="file-item" data-idx="${idx}">
          ${thumb}
          <div class="file-info">
            <div class="file-name" title="${file.name}">${file.name}</div>
            <div class="file-meta">
              <span class="file-size">${formatSize(file.size)}</span>
              <span class="file-status" id="status-${idx}">等待中</span>
            </div>
            <div class="progress-bar-container"><div class="progress-bar" id="progress-${idx}" style="width:0%"></div></div>
          </div>
        </div>`;
      }).join('');
    }

    function handleFiles(files) {
      const valid = [], invalid = [];
      Array.from(files).forEach(f => { (f.size <= MAX_FILE_SIZE ? valid : invalid).push(f); });
      if (invalid.length) showToast(`${invalid.length} 个文件超过 20MB 限制`);
      if (!valid.length) return;
      selectedFiles = selectedFiles.concat(valid);
      updateFileList();
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });

    // Paste support
    document.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const files = [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].kind === 'file') {
          const file = items[i].getAsFile();
          if (file) files.push(file);
        }
      }
      if (files.length) handleFiles(files);
    });

    clearBtn.addEventListener('click', () => {
      if (isUploading) return;
      selectedFiles = [];
      uploadResults = [];
      updateFileList();
      statsBar.style.display = 'none';
      resultArea.classList.remove('active');
    });

    uploadBtn.addEventListener('click', startUpload);

    async function startUpload() {
      if (isUploading || !selectedFiles.length) return;
      isUploading = true;
      uploadBtn.disabled = true;
      clearBtn.style.display = 'none';
      statsBar.style.display = 'flex';
      resultArea.classList.remove('active');
      uploadResults = [];

      const maxConcurrent = parseInt(concurrencySelect.value);
      let successCount = 0, errorCount = 0;

      async function uploadFile(file, idx) {
        return new Promise(resolve => {
          const formData = new FormData();
          formData.append('file', file);
          const xhr = new XMLHttpRequest();
          xhr.upload.onprogress = e => {
            if (e.lengthComputable) {
              const pct = Math.round((e.loaded / e.total) * 90);
              const bar = document.getElementById(`progress-${idx}`);
              const status = document.getElementById(`status-${idx}`);
              if (bar) bar.style.width = pct + '%';
              if (status) status.textContent = pct + '%';
            }
          };
          xhr.onload = () => {
            try {
              const res = JSON.parse(xhr.responseText);
              if (xhr.status === 200 && res[0]?.src) {
                const bar = document.getElementById(`progress-${idx}`);
                const status = document.getElementById(`status-${idx}`);
                if (bar) { bar.style.width = '100%'; bar.classList.add('success'); }
                if (status) { status.textContent = '成功'; status.classList.add('success'); }
                uploadResults.push({ name: file.name, src: res[0].src, success: true });
                successCount++;
                resolve(true);
              } else {
                const status = document.getElementById(`status-${idx}`);
                if (status) { status.textContent = '失败'; status.classList.add('error'); }
                uploadResults.push({ name: file.name, error: res[0]?.error || '上传失败', success: false });
                errorCount++;
                resolve(false);
              }
            } catch {
              const status = document.getElementById(`status-${idx}`);
              if (status) { status.textContent = '错误'; status.classList.add('error'); }
              uploadResults.push({ name: file.name, error: '解析错误', success: false });
              errorCount++;
              resolve(false);
            }
            updateStats();
          };
          xhr.onerror = () => {
            const status = document.getElementById(`status-${idx}`);
            if (status) { status.textContent = '网络错误'; status.classList.add('error'); }
            uploadResults.push({ name: file.name, error: '网络错误', success: false });
            errorCount++;
            updateStats();
            resolve(false);
          };
          xhr.open('POST', '/upload');
          xhr.send(formData);
        });
      }

      function updateStats() {
        document.getElementById('successCount').textContent = successCount;
        document.getElementById('errorCount').textContent = errorCount;
        document.getElementById('pendingCount').textContent = selectedFiles.length - successCount - errorCount;
      }

      for (let i = 0; i < selectedFiles.length; i += maxConcurrent) {
        await Promise.all(selectedFiles.slice(i, i + maxConcurrent).map((f, j) => uploadFile(f, i + j)));
      }

      // Show results
      const successResults = uploadResults.filter(r => r.success);
      if (successResults.length) {
        resultArea.classList.add('active');
        resultLinks.innerHTML = successResults.map(r => `
          <div class="result-item">
            <img class="result-thumb" src="${r.src}" alt="" onerror="this.style.display='none'">
            <a class="result-link" href="${location.origin}${r.src}" target="_blank">${location.origin}${r.src}</a>
            <button class="result-copy" data-link="${location.origin}${r.src}">复制</button>
          </div>
        `).join('');
        resultLinks.querySelectorAll('.result-copy').forEach(btn => {
          btn.addEventListener('click', () => {
            navigator.clipboard?.writeText(btn.dataset.link).then(() => {
              btn.textContent = '已复制!';
              setTimeout(() => { btn.textContent = '复制'; }, 1500);
            });
          });
        });
      }

      isUploading = false;
      uploadBtn.disabled = false;
      clearBtn.style.display = 'inline-flex';
      showToast(`上传完成：成功 ${successCount} 个，失败 ${errorCount} 个`);
    }

    copyAllBtn.addEventListener('click', () => {
      const links = uploadResults.filter(r => r.success).map(r => `${location.origin}${r.src}`).join('\n');
      if (!links) return;
      navigator.clipboard?.writeText(links).then(() => showToast('全部链接已复制！'));
    });

    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => e.preventDefault());
  </script>
</body>
</html>
